<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <form action="#" method="post">
    <h1 style="text-align:left; color: blue;">Contact Us</h1>
    <label for="fullname">Full Name</label>
    <input type="text" id="fullname" name="fullname" minlength="2" maxlength="50" placeholder="Enter your full name" required>
    <br><br>
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
    <br><br>
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Enter your phone number" required>
    <br><br>
    <label for="subject">Subject</label>
    <input type="text" id="subject" name="subject" maxlength="100" placeholder="Enter the subject">
    <br><br>
    <label for="message">Message</label>
    <textarea id="message" name="message" maxlength="500" placeholder="Enter your message" rows="5" cols="30" required></textarea>
    <br><br>
    <p>&copy; 2026 Contact Us</p>
    <input type="submit" value="Submit">
    </form>
</body>
</html>
